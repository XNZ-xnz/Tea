# 幸福工厂 — UE5.3。★战略结论：走 D3DMetal（CrossOver 同款），不走 DXVK ★
# appid 核实：Steam storefront API，2026-07-23
appid: "526870"
slug: satisfactory
name_zh: 幸福工厂
engine: UE5.3
api: d3d11              # 用 -dx11 强制 DX11（默认 DX12/Vulkan）
backend: d3dmetal       # ★关键★ 苹果 D3DMetal（gptk-wine 内置），非 DXVK
wine: gptk-wine-3.0-2
launch_args: ["-dx11"]  # 复刻 CrossOver 的启动项
env:
  D3DM_SUPPORT_DXR: "1"
  ROSETTA_ADVERTISE_AVX: "1"
  D3DM_ENABLE_METALFX: "1"
notes_zh: >-
  ★2026-07-24 决定性结论★：DXVK+MoltenVK 路线在此游戏黑屏（MoltenVK 对 DXVK 3.x 采样器堆
  动态索引 codegen 错译，tonemap 输出全零；已查到 SPIR-V 指令级，见 patches README）。
  换 D3DMetal 后端 + `-dx11`（与 CrossOver 完全相同的组合）→ 画面正常渲染、可进游戏世界，
  黑屏根治。D3DMetal 给游戏伪装 'AMD Compatibility Mode'(VendorId 10de) 桌面显卡，
  整条 MoltenVK 不经过，绕开该 bug。
  部署：撤走游戏目录 Engine/Binaries/Win64 的 DXVK 三件套（stash 在 _dxvk_stash/），
  用 gptk-wine 直启 Shipping exe（默认用户 crossover，存档/日志在 crossover profile）。
  启动器 FactoryGameSteam.exe 在 gptk-wine8 上会卡 loader_section，需直启 -Shipping exe 绕过。
  已知残留：帧率偏低（D3DMetal on wine8 跑 UE5 的性能课题，非正确性问题）。
  产品级教训：Tea 的主力后端应是 D3DMetal（用户导入 GPTK），DXVK 仅作简单 DX11 游戏补充。
  工具：tools/diagnostics/sf-run-d3dmetal.sh。
