# BioShock Infinite（8870）— 32 位 UE3。★进展大但未通关★
# ★抄作业（2026-07-24 查证）★：AppleGamingWiki/CodeWeavers 社区实测需 CrossOver 24（Wine 9）+
#   win10 64bit bottle + 关 DXVK/ESync/MSync + 注册 exe 直启。Tea 无 CX24 免费等价底座（gptk=CX22/Wine8）。
appid: "8870"
slug: bioshock-infinite
name_zh: 生化奇兵：无限
engine: UE3（32 位）
api: d3d11
backend: dxvk            # 实测 DXVK 走最深（窗口+设备 FL11_0+交换链）；wined3d 同点崩
wine: wine-devel-11.13+winemetal+mvk142
exe: BioShockInfinite.exe
dll_overrides: "d3d11,dxgi,d3d10core=n,b"
launch_args: ["-dx10"]   # D3D10 路径更简单（可选）
env:
  ROSETTA_ADVERTISE_AVX: "1"
notes_zh: >-
  ★2026-07-24 攻坚进展（从"判死"到"引擎运行后崩"）★：
  三个真 blocker 已清：①旧 wineserver 版本冲突(956/755)致静默秒退——切 wine 必须先 wineserver -k 全清
  ②开场 Bink 视频在 32 位下崩——移走 XGame/Movies 的 6 个开场片(AMDLogo720p/BSI_AnimatedLogo_720p2997/
  UE3AnimatedLogo_ProRes/LoopingMovieUntilStartupFinishes/IrrationalLogoTest/2KLogoSweep720p2997，
  stash 在 Movies/_startup_stash/) ③Steam overlay 注入(已 .disabled)。
  清完后：全尺寸 BioShock Infinite 窗口(1470x956)+D3D11 设备 FL11_0+交换链全部建成、引擎运行。
  ★剩余 blocker：窗口创建后约 10-15s 触发 UE3 Fatal error(Address=0x0 空指针)★——
  **与图形后端无关**(DXVK/wined3d 同点同崩)，是游戏自身代码在 32 位 wine 上踩空指针，换后端无效。
  与社区结论一致：此游戏需 CX24/Wine9 的 32 位修复面，Tea 免费 wine 尚缺。
  ★续攻(winedbg 抓栈)★：第一现场 c0000005 读 null，崩溃时加载 atiadlxx.dll——DXVK 默认报 AMD，
  游戏走 AMD ADL 查询崩。修复：dxvk.conf 报 NVIDIA(customVendorId=10de) + 禁 atiadlxx/nvapi override。
  → 崩点移位（越过 AMD 路径，VkInstance 建成又销毁），转为"Exception frame not in stack limits"(32位栈异常)。
  **多堵墙串联**（已清 wineserver污染→Bink视频→overlay→atiadlxx，现剩 32位栈异常）——与 Satisfactory
  同型，与社区"需 CX24 多年32位修复"结论一致。装了 DirectX Jun2010 redist(XAudio2_7/X3DAudio/D3DCompiler_43)。
  ★三个免费 wine 全测遍(2026-07-25)，确认硬边界★：
  - winecx-xom-5.4.2：无 i386 树=纯64位wine，跑不了32位游戏(syswow64/cmd都打不开)
  - gptk-wine-3.0-2(CX22 32on64)：引擎前就退(D3DMetal疑64位专用)
  - wine-devel-11.13(Wine11 新wow64)：最深——窗口+设备FL11_0+交换链+引擎运行+越过AMD路径，
    清4墙(wineserver/Bink/overlay/atiadlxx)后死于32位栈异常(Exception frame not in stack limits)
  **结论：Tea 现有免费 wine 无一能跑通此32位游戏到可玩。** 需 CrossOver 专有 CX24 wine
  (多年 32位-on-AppleSilicon 异常处理补丁 + 32位D3DMetal/wined3d)，或未来免费 CX系32on64 带同款补丁。
  与 Satisfactory 的 MoltenVK bug 同型：外部依赖硬边界，非配置可解。
  下一步(需外部条件)：获取 CX24 等价免费底座；或 winedbg 逐个补 wine 侧32位异常(Satisfactory级多小时)。
